<!DOCTYPE html>
<html>
<head>
  <title>Share Your Story | Plotify</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f7;
      color: #2c3e50;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }

    body.fade-in {
      opacity: 1;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px 30px;
      text-align: center;
      font-size: 1.5em;
    }

    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 15px 0;
      margin-top: 40px;
    }

    h1 {
      color: #08021d;
      text-align: center;
      margin: 40px 0 20px;
    }

    form {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1em;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #040113;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.3s;
    }

    button:hover {
      background: #732d91;
    }

    a {
      color: white;
      text-decoration: none;
    }

    nav a {
      margin: 0 15px;
      font-weight: bold;
    }

    nav {
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      header {
        font-size: 1.2em;
      }

      nav a {
        display: block;
        margin: 10px 0;
      }
    }
  </style>
</head>
<body>
  <header>
    Plotify
    <br>
    <nav>
      <a href="plotify1.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="success-stories.html">Success Stories</a>
    </nav>
  </header>

  <h1>Share Your Plotify Success Story</h1>

  <form action="thank-you.html" method="POST">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" placeholder="e.g., Ramesh P." required>

    <label for="city">Your City</label>
    <input type="text" id="city" name="city" placeholder="e.g., Pune" required>

    <label for="story">Your Story</label>
    <textarea id="story" name="story" placeholder="Tell us how Plotify helped you..." required></textarea>

    <button type="submit">Submit</button>
  </form>

  <footer>
    &copy; 2025 Plotify. All rights reserved.
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("fade-in");
    });

    document.querySelectorAll("a").forEach(link => {
      if (!link.href.includes("#") && link.target !== "_blank") {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          const url = this.href;
          document.body.classList.remove("fade-in");
          document.body.style.opacity = 0;
          setTimeout(() => window.location.href = url, 400);
        });
      }
    });
  </script>
</body>
</html>
