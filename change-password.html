<!DOCTYPE html>
<html>
<head>
  <title>Change Password | Plotify</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #2c3e50, #34495e);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .form-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(5px);
      width: 300px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
    }
    input {
      background-color: #ecf0f1;
      color: #2c3e50;
    }
    button {
      background-color: #1abc9c;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #16a085;
    }
    .link {
      color: #1abc9c;
      text-decoration: none;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Change Password</h2>
    <input type="password" id="oldPassword" placeholder="Old Password" required>
    <input type="password" id="newPassword" placeholder="New Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
    <button onclick="changePassword()">Update Password</button>
    <a class="link" href="profile.html">Back to Profile</a>
  </div>
  <script>
    function changePassword() {
      const oldPass = document.getElementById("oldPassword").value;
      const newPass = document.getElementById("newPassword").value;
      const confirmPass = document.getElementById("confirmPassword").value;
      const user = JSON.parse(localStorage.getItem("plotifyUser"));
      if (!user) {
        alert("User not found. Please login again.");
        window.location.href = "login.html";
        return;
      }
      if (oldPass !== user.password) {
        alert("Old password is incorrect.");
        return;
      }
      if (newPass !== confirmPass) {
        alert("New passwords do not match.");
        return;
      }
      user.password = newPass;
      localStorage.setItem("plotifyUser", JSON.stringify(user));
      alert("Password changed successfully!");
      window.location.href = "profile.html";
    }
  </script>
</body>
</html>
