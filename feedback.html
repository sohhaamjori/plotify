<!DOCTYPE html>
<html>
<head>
  <title>Feedback | Plotify</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f7;
      color: #2c3e50;
      line-height: 1.6;
    }
    header {
      background-color: #2c3e50;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .logo {
      display: flex;
      align-items: center;
    }
    .logo img {
      height: 40px;
      margin-right: 10px;
    }
    .logo h1 {
      font-size: 24px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    nav ul li a:hover {
      color: #1abc9c;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1abc9c;
    }
    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="c:/Users/OLDCONF/Desktop/plotify/plotify.png" alt="Plotify Logo" />
      <h1>Plotify</h1>
    </div>
    <nav>
      <ul>
        <li><a href="dashboard.html">Back</a></li>
      </ul>
    </nav>
  </header>
  <div class="container">
    <h1>Feedback</h1>
    <form onsubmit="submitFeedback(event)">
      <label for="name">Your Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required />
      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required />
      <label for="message">Message:</label>
      <textarea id="message" rows="5" placeholder="Write your feedback here..." required></textarea>
      <button type="submit">Submit Feedback</button>
    </form>
  </div>
  <footer>
  &copy; 2025 Plotify. All rights reserved.
  </footer>
  <script>
    function submitFeedback(event) {
      event.preventDefault();
      alert("Thank you for your feedback!");
      document.querySelector("form").reset();
    }
  </script>
</body>
</html>
