<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Plotify</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #2c3e50, #34495e);
            margin: 0;
            overflow-x: hidden;
        }
        header {
            background-color: #1abc9c;
            color: white;
            padding: 15px 30px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 12px;
            position: fixed;
            width: 100%;
            bottom: 0;
            font-size: 14px;
        }
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: blur(6px);
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(44, 62, 80, 0.6);
            z-index: -1;
        }
        .fade-in {
            opacity: 0;
            animation: fadeIn 1s ease-in-out forwards;
        }
        .fade-out {
            animation: fadeOut 1s ease-in-out forwards;
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding-top: 40px;
        }
        .box {
            background-color: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            z-index: 1;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1abc9c;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #16a085;
        }
        .extra {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .extra a {
            color: #1abc9c;
            text-decoration: none;
        }
        .extra a:hover {
            text-decoration: underline;
        }
        #confirmation {
            display: none;
            text-align: center;
            color: green;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<header>
    Plotify - Forgot Password
</header>
<video autoplay muted loop playsinline id="bg-video">
    <source src="c:/Users/OLDCONF/Desktop/html/plotify.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>
<div class="fade-in container" id="fadeContainer">
    <div class="overlay"></div>
    <div class="box">
        <h2>Reset Your Password</h2>
        <form onsubmit="handleReset(event)">
            <input type="email" name="email" placeholder="Enter your email" required oninvalid="this.setCustomValidity('Please enter a valid email')" oninput="this.setCustomValidity('')">
            <button type="submit" id="resetBtn">Send Reset Link</button>
        </form>
        <div id="confirmation">A password reset link has been sent to your email.</div>
        <div class="extra">
            <a href="login.html">Back to Login</a>
        </div>
    </div>
</div>
<footer>
    &copy; 2025 Plotify. All rights reserved.
</footer>
<script>
    function handleReset(event) {
        event.preventDefault();
        const btn = document.getElementById("resetBtn");
        const msg = document.getElementById("confirmation");
        const fade = document.getElementById("fadeContainer");
        btn.innerText = "Sending...";
        btn.disabled = true;
        fade.classList.remove("fade-in");
        fade.classList.add("fade-out");
        setTimeout(() => {
            msg.style.display = "block";
            btn.innerText = "Send Reset Link";
            btn.disabled = false;
            fade.classList.remove("fade-out");
            fade.classList.add("fade-in");
        }, 1500);
    }
</script>
</body>
</html>
